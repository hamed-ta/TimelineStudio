<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timeline Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Timeline Studio</h1>
            <p id="statusText" aria-live="polite">Ready</p>
          </div>
        </div>

        <div class="toolbar" role="toolbar" aria-label="Timeline actions">
          <button type="button" class="toolbar-button" data-add="event">Event</button>
          <button type="button" class="toolbar-button" data-add="period">Period</button>
          <button type="button" class="toolbar-button" data-add="line">Line</button>
          <button type="button" class="toolbar-button" data-add="text">Text</button>
          <span class="separator" aria-hidden="true"></span>
          <label class="toolbar-check">
            <input id="itemsLockedInput" type="checkbox" />
            Lock items
          </label>
          <span class="separator" aria-hidden="true"></span>
          <button type="button" class="toolbar-button" id="saveJsonButton">Save JSON</button>
          <button type="button" class="toolbar-button" id="loadJsonButton">Load JSON</button>
          <span class="separator" aria-hidden="true"></span>
          <button type="button" class="toolbar-button" id="exportSvgButton">SVG</button>
          <button type="button" class="toolbar-button" id="exportPngButton">PNG</button>
          <button type="button" class="toolbar-button" id="exportPdfButton">PDF</button>
        </div>

        <div class="zoom-tools">
          <button type="button" class="icon-button" id="zoomOutButton" aria-label="Zoom out">-</button>
          <label for="zoomRange">Zoom</label>
          <input id="zoomRange" type="range" min="0.5" max="360" step="0.5" value="18" />
          <span id="zoomLabel">18 px/month</span>
          <button type="button" class="icon-button" id="zoomInButton" aria-label="Zoom in">+</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="inspector" aria-label="Timeline editor">
          <section class="panel">
            <div class="panel-heading">
              <h2>Timeline</h2>
            </div>

            <label>
              Title
              <input id="timelineTitleInput" type="text" autocomplete="off" />
            </label>

            <div class="field-grid">
              <label>
                Start date
                <input id="startDateInput" type="text" inputmode="numeric" placeholder="YYYY-MM-DD" autocomplete="off" />
              </label>
              <label>
                End date
                <input id="endDateInput" type="text" inputmode="numeric" placeholder="YYYY-MM-DD" autocomplete="off" />
              </label>
            </div>

            <label class="check-row">
              <input id="autoEndDateInput" type="checkbox" />
              End at today
            </label>

            <label>
              Drag snap
              <select id="snapInput">
                <option value="year">1 year</option>
                <option value="month">1 month</option>
                <option value="week">1 week</option>
                <option value="day">1 day</option>
              </select>
            </label>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>Rows / Lines</h2>
              <button type="button" class="quiet-button" id="addLaneButton">Add</button>
            </div>
            <div class="lane-list" id="laneList"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>Item</h2>
              <button type="button" class="quiet-button danger" id="deleteItemButton">Delete</button>
            </div>

            <form id="itemForm">
              <label>
                Type
                <select id="itemTypeInput">
                  <option value="event">Event</option>
                  <option value="period">Period</option>
                  <option value="line">Line</option>
                  <option value="text">Text</option>
                </select>
              </label>

              <label>
                Title
                <input id="itemTitleInput" type="text" autocomplete="off" />
              </label>

              <div class="field-grid">
                <label>
                  Lane
                  <input id="itemLaneInput" type="number" min="0" max="20" step="1" />
                </label>
                <label>
                  Color
                  <input id="itemColorInput" type="color" />
                </label>
                <label>
                  Start date
                  <input id="itemStartInput" type="text" inputmode="numeric" placeholder="YYYY-MM-DD" autocomplete="off" />
                </label>
                <label id="itemEndField">
                  End date
                  <input id="itemEndInput" type="text" inputmode="numeric" placeholder="YYYY-MM-DD" autocomplete="off" />
                </label>
              </div>
              <p class="calendar-preview" id="itemCalendarPreview"></p>

              <label>
                Notes
                <textarea id="itemNotesInput" rows="4"></textarea>
              </label>

              <div class="form-actions">
                <button type="submit" class="primary-button">Apply</button>
                <button type="button" class="secondary-button" id="duplicateItemButton">Duplicate</button>
              </div>
            </form>
          </section>
        </aside>

        <section class="timeline-stage" aria-label="Timeline canvas">
          <div class="stage-header">
            <div>
              <h2 id="stageTitle">New Timeline</h2>
              <p id="stageMeta">Create or load a timeline</p>
            </div>
            <button type="button" class="secondary-button" id="fitButton">Fit</button>
          </div>

          <div class="timeline-viewport" id="timelineViewport" tabindex="0">
            <svg id="timelineSvg" role="img" aria-labelledby="stageTitle stageMeta"></svg>
          </div>
        </section>
      </main>
    </div>

    <input id="fileInput" type="file" accept="application/json,.json" hidden />
    <script src="app.js"></script>
  </body>
</html>
